{% extends "admin/base.html" %}
{% block title %}Reset mật khẩu - Admin{% endblock %}
{% block admin_content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div style="margin-bottom:1.5rem;">
        <a href="{{ url_for('admin.users') }}" style="color: var(--text-muted);">← Quay lại danh sách</a>
        <h1 style="font-size:1.5rem;font-weight:800;color:var(--secondary);margin-top:0.5rem;">
            🔑 Reset mật khẩu
        </h1>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:0.25rem;">
            Tài khoản: <strong>{{ user.username }}</strong> &lt;{{ user.email }}&gt;
        </p>
    </div>

    <form method="POST" class="card animate-in">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label>Mật khẩu mới</label>
            <input type="password" class="form-control" name="new_password" id="new_password" required
                   placeholder="Nhập mật khẩu mới">
            <div style="margin-top:0.4rem;font-size:0.75rem;color:var(--text-muted);">
                Tối thiểu 8 ký tự, gồm chữ hoa, chữ thường và số
            </div>
        </div>

        <div class="form-group">
            <label>Xác nhận mật khẩu mới</label>
            <input type="password" class="form-control" name="confirm_password" id="confirm_password" required
                   placeholder="Nhập lại mật khẩu mới">
        </div>

        <div id="password-match" style="font-size:0.8rem;margin-bottom:0.5rem;"></div>

        <div style="display:flex;gap:0.75rem;">
            <button type="submit" class="btn btn-primary" id="submit-btn">💾 Lưu mật khẩu mới</button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Hủy</a>
        </div>
    </form>
</div>

<script>
const p1 = document.getElementById('new_password');
const p2 = document.getElementById('confirm_password');
const msg = document.getElementById('password-match');
const btn = document.getElementById('submit-btn');

function check() {
    if (p1.value && p2.value) {
        if (p1.value === p2.value) {
            msg.textContent = '✓ Mật khẩu khớp';
            msg.style.color = '#10b981';
            btn.disabled = false;
        } else {
            msg.textContent = '✗ Mật khẩu không khớp';
            msg.style.color = '#ef4444';
            btn.disabled = true;
        }
    } else {
        msg.textContent = '';
        btn.disabled = false;
    }
}
p1.addEventListener('input', check);
p2.addEventListener('input', check);
</script>
{% endblock %}
