{% extends "admin/base.html" %}
{% block title %}{{ action }} - Admin{% endblock %}
{% block admin_content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="page-header animate-in" style="padding: 1.5rem 0;">
        <a href="{{ url_for('admin.users') }}" style="color: var(--text-muted);">← Quay lại</a>
        <h1 style="font-size: 1.5rem; margin-top: 1rem;">{{ action }}</h1>
    </div>
    <form method="POST" class="card animate-in">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" class="form-control" name="username" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" name="email" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" class="form-control" name="password" required>
        </div>
        <div class="form-group">
            <label style="display:flex;align-items:center;gap:0.8rem;">
                <input type="checkbox" name="is_admin"> Admin
            </label>
        </div>
        <button type="submit" class="btn btn-primary">Tạo</button>
    </form>
</div>
{% endblock %}
