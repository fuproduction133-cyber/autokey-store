services:
  - type: web
    name: autokey-store
    env: python
    pythonVersion: "3.11"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: VIETQR_BANK_ID
        sync: false
      - key: VIETQR_ACCOUNT_NO
        sync: false
      - key: VIETQR_ACCOUNT_NAME
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: autokey-db
          property: connectionString
